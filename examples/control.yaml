schema_version: 1
profile: control
machine:
  name: brain-control
  user: operator
  role: control
  sshUser: operator
  hostname: brain-control
paths:
  home: /home/operator
  productRepo: ~/brainstack
  sharedBrainRoot: ~/shared-brain
  privateBrainRoot: ~/private-brain
  stateRoot: ~/.local/state/brainstack
  configRoot: ~/.config/brainstack
  systemdUserRoot: ~/.config/systemd/user
brain:
  bind: 127.0.0.1
  port: 8080
  publicBaseUrl: https://brain-control.example.ts.net
  largeFileThresholdBytes: 10485760
telemux:
  enabled: false
tailscale:
  tailnetHost: brain-control.example.ts.net
  controlTag: tag:brain
  workerTag: tag:brain-worker
  advertiseTags:
    - tag:brain
  enableSsh: false

