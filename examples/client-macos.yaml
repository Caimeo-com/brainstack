schema_version: 1
profile: client-macos
harness:
  name: codex
  bin: codex
machine:
  name: mac-client
  user: operator
  role: client
  sshUser: operator
  hostname: mac-client
paths:
  home: /Users/operator
  productRepo: ~/brainstack
  sharedBrainRoot: ~/shared-brain
  privateBrainRoot: ~/private-brain
  stateRoot: ~/.local/state/brainstack
  configRoot: ~/.config/brainstack
  systemdUserRoot: ~/.config/systemd/user
brain:
  bind: 127.0.0.1
  port: 8080
  publicBaseUrl: https://brain-control.example.ts.net
  largeFileThresholdBytes: 10485760
telemux:
  enabled: false
tailscale:
  tailnetHost: ""
  controlTag: tag:brain
  workerTag: tag:brain-worker
  advertiseTags: []
  enableSsh: false
client:
  localPath: ~/shared-brain
  envPath: ~/.config/shared-brain.env
  remoteSsh: operator@brain-control:/home/operator/shared-brain/bare/shared-brain.git
