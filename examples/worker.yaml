profile: worker
machine:
  name: erbine
  user: factory
  role: worker
  sshUser: factory
  hostname: erbine
paths:
  home: /home/factory
  productRepo: ~/brainstack
  sharedBrainRoot: ~/shared-brain
  privateBrainRoot: ~/private-brain
  stateRoot: ~/.local/state/brainstack
  configRoot: ~/.config/brainstack
  systemdUserRoot: ~/.config/systemd/user
brain:
  bind: 127.0.0.1
  port: 8080
  publicBaseUrl: ""
  largeFileThresholdBytes: 10485760
telemux:
  enabled: false
tailscale:
  tailnetHost: erbine.tailb647b6.ts.net
  controlTag: tag:brain
  workerTag: tag:brain-worker
  advertiseTags:
    - tag:brain-worker
  enableSsh: false

