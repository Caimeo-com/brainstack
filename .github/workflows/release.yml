name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0. Defaults to package.json version."
        required: false
        type: string
      publish_release:
        description: "Create or update a GitHub Release with the generated assets."
        required: false
        default: false
        type: boolean
      include_menu_app:
        description: "Also build, sign, notarize, and attach the macOS menu app."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve release version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      publish: ${{ steps.version.outputs.publish }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Guard privileged release ref
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          PUBLISH_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release == true }}
          INCLUDE_MENU_APP: ${{ github.event_name == 'workflow_dispatch' && inputs.include_menu_app == true }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && { [ "$PUBLISH_RELEASE" = "true" ] || [ "$INCLUDE_MENU_APP" = "true" ]; }; then
            expected_ref="refs/heads/$DEFAULT_BRANCH"
            if [ "$REF" != "$expected_ref" ]; then
              echo "manual release publishing/signing must run from $expected_ref; got $REF" >&2
              exit 1
            fi
          fi

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release provenance
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
          PUBLISH_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release == true }}
          INCLUDE_MENU_APP: ${{ github.event_name == 'workflow_dispatch' && inputs.include_menu_app == true }}
        run: |
          set -euo pipefail
          git fetch --quiet origin "+refs/heads/$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH"
          release_commit="$(git rev-parse "${GITHUB_SHA_VALUE}^{commit}")"
          if [ "$REF_TYPE" = "tag" ]; then
            if ! git merge-base --is-ancestor "$release_commit" "refs/remotes/origin/$DEFAULT_BRANCH"; then
              echo "release tag commit must be reachable from origin/$DEFAULT_BRANCH" >&2
              exit 1
            fi
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && { [ "$PUBLISH_RELEASE" = "true" ] || [ "$INCLUDE_MENU_APP" = "true" ]; }; then
            if ! git merge-base --is-ancestor "$release_commit" "refs/remotes/origin/$DEFAULT_BRANCH"; then
              echo "manual release commit must be reachable from origin/$DEFAULT_BRANCH" >&2
              exit 1
            fi
          fi

      - name: Resolve release version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          package_version="$(
            sed -n 's/^[[:space:]]*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' package.json | head -n 1
          )"
          if [ -z "$package_version" ]; then
            echo "could not read package.json version" >&2
            exit 1
          fi
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
            publish="true"
            tag="$GITHUB_REF_NAME"
          elif [ -n "${INPUT_VERSION:-}" ]; then
            version="$INPUT_VERSION"
            publish="${{ inputs.publish_release }}"
            tag="v$version"
          else
            version="$package_version"
            publish="${{ inputs.publish_release }}"
            tag="v$version"
          fi
          case "$version" in
            ""|*[!A-Za-z0-9._-]*)
              echo "invalid release version: $version" >&2
              exit 1
              ;;
          esac
          if [ "$version" != "$package_version" ]; then
            echo "release version $version must match package.json version $package_version because brainctl embeds the default invite install tag" >&2
            exit 1
          fi
          {
            echo "version=$version"
            echo "publish=$publish"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

  cli-release:
    name: Build CLI release assets
    runs-on: macos-15
    timeout-minutes: 60
    needs: resolve

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Build CLI release assets
        shell: bash
        env:
          BRAINSTACK_RELEASE_VERSION: ${{ needs.resolve.outputs.version }}
          BRAINSTACK_RELEASE_MENU_APP: "0"
        run: |
          set -euo pipefail
          scripts/release.sh

      - name: Upload CLI workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brainstack-${{ needs.resolve.outputs.version }}-cli-release-assets
          path: |
            dist/brainctl-*
            dist/install.sh
            dist/manifest.json
            dist/brainstack-${{ needs.resolve.outputs.version }}.tar.gz
            dist/brainstack-${{ needs.resolve.outputs.version }}.tar.gz.sha256
          if-no-files-found: error

  menu-app-release:
    name: Build signed macOS menu app assets
    runs-on: macos-15
    timeout-minutes: 60
    needs:
      - resolve
      - cli-release
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.include_menu_app == true)
    outputs:
      built: ${{ steps.signing.outputs.available }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check Apple signing secrets
        id: signing
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INCLUDE_MENU_APP: ${{ github.event_name == 'workflow_dispatch' && inputs.include_menu_app == true }}
          MACOS_DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERT_P12_BASE64 }}
          MACOS_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            MACOS_DEVELOPER_ID_CERT_P12_BASE64 \
            MACOS_DEVELOPER_ID_CERT_PASSWORD \
            MACOS_KEYCHAIN_PASSWORD \
            MACOS_CODESIGN_IDENTITY \
            APP_STORE_CONNECT_API_KEY_P8_BASE64 \
            APP_STORE_CONNECT_API_KEY_ID \
            APP_STORE_CONNECT_API_ISSUER_ID
          do
            if [ -z "${!name:-}" ]; then
              echo "missing secret: $name" >&2
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INCLUDE_MENU_APP" = "true" ]; then
              echo "menu app release was explicitly requested; signing secrets are required" >&2
              exit 1
            fi
            echo "Apple signing secrets absent; skipping menu app artifacts for this tag release."
            exit 0
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Download CLI release assets
        if: steps.signing.outputs.available == 'true'
        uses: actions/download-artifact@v4
        with:
          name: brainstack-${{ needs.resolve.outputs.version }}-cli-release-assets
          path: dist

      - name: Build unsigned universal menu app inputs
        if: steps.signing.outputs.available == 'true'
        shell: bash
        working-directory: apps/brainstack-menu
        run: |
          set -euo pipefail
          swift build -c release --arch arm64 --arch x86_64

      - name: Import Developer ID certificate
        if: steps.signing.outputs.available == 'true'
        shell: bash
        env:
          MACOS_DEVELOPER_ID_CERT_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERT_P12_BASE64 }}
          MACOS_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERT_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          cert_path="$RUNNER_TEMP/brainstack-developer-id.p12"
          keychain_path="$RUNNER_TEMP/brainstack-signing.keychain-db"
          printf '%s' "$MACOS_DEVELOPER_ID_CERT_P12_BASE64" | base64 --decode > "$cert_path"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$cert_path" -P "$MACOS_DEVELOPER_ID_CERT_PASSWORD" -t cert -f pkcs12 -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$MACOS_KEYCHAIN_PASSWORD" "$keychain_path"

      - name: Write App Store Connect API key
        if: steps.signing.outputs.available == 'true'
        id: notary-key
        shell: bash
        env:
          APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8_BASE64" | base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "path=$key_path" >> "$GITHUB_OUTPUT"

      - name: Build, sign, notarize, and staple menu app assets
        if: steps.signing.outputs.available == 'true'
        shell: bash
        env:
          BRAINSTACK_MENU_VERSION: ${{ needs.resolve.outputs.version }}
          BRAINSTACK_MENU_ARCHES: "arm64 x64"
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          APP_STORE_CONNECT_API_KEY_PATH: ${{ steps.notary-key.outputs.path }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          apps/brainstack-menu/scripts/make-app.sh --skip-build --notarize

      - name: Write menu app checksums
        if: steps.signing.outputs.available == 'true'
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          cd apps/brainstack-menu/dist
          shasum -a 256 "BrainstackMenu-$VERSION.zip" > "BrainstackMenu-$VERSION.zip.sha256"
          shasum -a 256 "BrainstackMenu-$VERSION.dmg" > "BrainstackMenu-$VERSION.dmg.sha256"

      - name: Upload menu app workflow artifacts
        if: steps.signing.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: brainstack-${{ needs.resolve.outputs.version }}-menu-app-assets
          path: |
            apps/brainstack-menu/dist/BrainstackMenu-*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    needs:
      - resolve
      - cli-release
      - menu-app-release
    if: always() && needs.resolve.outputs.publish == 'true' && needs.cli-release.result == 'success' && (needs.menu-app-release.result == 'success' || needs.menu-app-release.result == 'skipped')

    steps:
      - name: Download CLI release assets
        uses: actions/download-artifact@v4
        with:
          name: brainstack-${{ needs.resolve.outputs.version }}-cli-release-assets
          path: release-assets/cli

      - name: Download menu app release assets
        if: needs.menu-app-release.outputs.built == 'true'
        uses: actions/download-artifact@v4
        with:
          name: brainstack-${{ needs.resolve.outputs.version }}-menu-app-assets
          path: release-assets/menu

      - name: Publish assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.tag }}
          MENU_BUILT: ${{ needs.menu-app-release.outputs.built }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release-assets/cli/*)
          if [ "$MENU_BUILT" = "true" ]; then
            assets+=(release-assets/menu/*)
          fi
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "no release assets downloaded" >&2
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${assets[@]}" --clobber
          else
            gh release create "$TAG" "${assets[@]}" --title "$TAG" --generate-notes
          fi
